[CustomSensors][gpu_power]
name=Gpu power draw
command=nvidia-smi --query-gpu=power.draw --format=noheader,nounits
device_class=power
interval=10s
state_class=measurement
unit_of_measurement=W

[CustomSensors][cpu_power]
name=Cpu power draw
command=bash -c 'F=/sys/class/powercap/intel-rapl/intel-rapl:0/energy_uj; E1=$(cat $F); sleep 1; E2=$(cat $F); awk "BEGIN {print ($E2 - $E1) / 1000000}"'
device_class=power
interval=10s
state_class=measurement
unit_of_measurement=W

[Integrations]
AccentColour=true
Active=true
ActiveWindow=false
Audio=true
Battery=false
Bluetooth=false
CameraWatcher=false
CustomSensors=true
DnD=true
Gamepad=false
