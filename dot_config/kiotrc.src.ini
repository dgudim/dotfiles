[CustomSensors][gpu_power]
name=Gpu power draw
command=nvidia-smi --query-gpu=power.draw --format=noheader,nounits
device_class=power
interval=10s
state_class=measurement
unit_of_measurement=W

[CustomSensors][cpu_power]
name=Cpu power draw
command=bash -c 'D="/sys/class/powercap/intel-rapl/intel-rapl:0"; E1=$(cat $D/energy_uj); sleep 1; E2=$(cat $D/energy_uj); MAX=$(cat $D/max_energy_range_uj); awk -v e1="$E1" -v e2="$E2" -v max="$MAX" "BEGIN {d=e2-e1; print (d<0 ? (max-e1)+e2 : d) / 1000000}"'
device_class=power
interval=10s
state_class=measurement
unit_of_measurement=W

[Integrations]
